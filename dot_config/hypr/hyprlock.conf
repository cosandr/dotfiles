# https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace

# https://github.com/MrVivekRajan/Hyprlock-Styles/blob/main/Style-6/hyprlock.conf

$font = Noto Sans

background {
    monitor =
    path = ~/.wallpaper
    blur_passes = 1
    blur_size = 3
}

general {
    ignore_empty_input = true
    immediate_render = true
}

animations {
    animation = fadeIn, 1, 6, default
    animation = fadeOut, 1, 3, default
    animation = inputFieldDots, 1, 1, default
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] date +"%A, %B %d"
    color = rgba(255, 255, 255, .65)
    font_size = 22
    font_family = $font
    position = 0, 420
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(255, 255, 255, .65)
    font_size = 90
    font_family = $font
    position = 0, 350
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 350, 40
    rounding = 0
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(86, 90, 90, 1)
    inner_color = rgba(40, 40, 40, 1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = true
    font_family = $font
    placeholder_text = <i><span foreground="##ffffff99"></span></i>
    hide_input = false
    position = 0, 0
    halign = center
    valign = center
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] ~/.config/hypr/current-song.sh
    color = rgba(255, 255, 255, 0.55)
    font_size = 17
    font_family = $font
    position = 0, 30
    halign = center
    valign = bottom
}
